<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f6f7fb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Tracking Car">
    <title>Tracking Car</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">BLE Tracking</p>
          <h1>循迹小车</h1>
        </div>
        <button class="connect-button" id="connectButton" type="button">
          <span class="status-dot" id="statusDot"></span>
          <span id="connectLabel">连接</span>
        </button>
      </header>

      <section class="status-strip" aria-live="polite">
        <span id="connectionStatus">未连接</span>
        <span id="lastCommand">待机</span>
      </section>

      <section class="run-panel" aria-label="Run controls">
        <button class="primary-button start-button" id="startButton" type="button" disabled>
          <span class="button-icon">▶</span>
          <span>开始循迹</span>
        </button>
        <button class="primary-button stop-button" id="stopButton" type="button" disabled>
          <span class="button-icon">■</span>
          <span>停止</span>
        </button>
      </section>

      <section class="speed-panel" aria-label="Speed">
        <div class="panel-label">
          <span>直线速度</span>
          <output class="speed-output" id="straightSpeedValue">120</output>
        </div>
        <input id="straightSpeedSlider" type="range" min="40" max="180" value="120" step="1" disabled>
        <div class="panel-label secondary-label">
          <span>转弯速度</span>
          <output class="speed-output" id="turnSpeedValue">75</output>
        </div>
        <input id="turnSpeedSlider" type="range" min="40" max="180" value="75" step="1" disabled>
      </section>

      <section class="tools-panel" aria-label="Tools">
        <button class="tool-button" id="resetButton" type="button" disabled>复位运行</button>
        <button class="tool-button" id="debugButton" type="button" disabled>调试开关</button>
      </section>

      <section class="sensor-panel" aria-label="Tracking sensors">
        <div class="sensor-card">
          <span class="sensor-label">左 A3</span>
          <strong id="leftSensor">---</strong>
        </div>
        <div class="sensor-card">
          <span class="sensor-label">中 A2</span>
          <strong id="centerSensor">---</strong>
        </div>
        <div class="sensor-card">
          <span class="sensor-label">右 A1</span>
          <strong id="rightSensor">---</strong>
        </div>
      </section>

      <section class="telemetry-panel" aria-live="polite">
        <div>
          <span class="telemetry-label">设备</span>
          <strong id="deviceName">-</strong>
        </div>
        <div>
          <span class="telemetry-label">最近指令</span>
          <strong id="commandEcho">-</strong>
        </div>
        <div>
          <span class="telemetry-label">黑线数量</span>
          <strong id="activeCount">-</strong>
        </div>
        <div>
          <span class="telemetry-label">运行状态</span>
          <strong id="runState">-</strong>
        </div>
        <div>
          <span class="telemetry-label">直线/转弯</span>
          <strong id="speedEcho">-</strong>
        </div>
      </section>
    </main>

    <script src="app.js?v=dual-speed-1"></script>
  </body>
</html>
