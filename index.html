<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f6f7fb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Tracking Car">
    <title>Tracking Car</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">BLE Tracking</p>
          <h1>循迹小车</h1>
        </div>
        <button class="connect-button" id="connectButton" type="button">
          <span class="status-dot" id="statusDot"></span>
          <span id="connectLabel">连接</span>
        </button>
      </header>

      <section class="status-strip" aria-live="polite">
        <span id="connectionStatus">未连接</span>
        <span id="lastCommand">待机</span>
      </section>

      <section class="run-panel" aria-label="Run controls">
        <button class="primary-button start-button" id="startButton" type="button" disabled>
          <span class="button-icon">▶</span>
          <span>开始循迹</span>
        </button>
        <button class="primary-button stop-button" id="stopButton" type="button" disabled>
          <span class="button-icon">■</span>
          <span>停止</span>
        </button>
      </section>

      <section class="speed-panel" aria-label="Speed">
        <div class="panel-label">
          <span>速度</span>
          <output id="speedValue">95</output>
        </div>
        <input id="speedSlider" type="range" min="40" max="180" value="95" step="1" disabled>
      </section>

      <section class="tools-panel" aria-label="Tools">
        <button class="tool-button" id="resetButton" type="button" disabled>复位运行</button>
        <button class="tool-button" id="debugButton" type="button" disabled>调试开关</button>
      </section>

      <section class="telemetry-panel" aria-live="polite">
        <div>
          <span class="telemetry-label">设备</span>
          <strong id="deviceName">-</strong>
        </div>
        <div>
          <span class="telemetry-label">最近指令</span>
          <strong id="commandEcho">-</strong>
        </div>
      </section>
    </main>

    <script src="app.js?v=tracking-1"></script>
  </body>
</html>
