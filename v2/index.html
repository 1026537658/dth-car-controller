<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="DTH Car">
    <title>DTH Car</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">=DTH</p>
          <h1>Car</h1>
        </div>
        <button class="connect-button" id="connectButton" type="button">
          <span class="status-dot" id="statusDot"></span>
          <span id="connectLabel">Connect</span>
        </button>
      </header>

      <section class="status-strip" aria-live="polite">
        <span id="connectionStatus">Offline</span>
        <span id="lastCommand">X</span>
      </section>

      <section class="control-grid" aria-label="Direction controls">
        <span></span>
        <button class="control-button" data-command="W" aria-label="Forward" type="button">↑</button>
        <span></span>
        <button class="control-button" data-command="A" aria-label="Left" type="button">←</button>
        <button class="control-button stop-button" data-command="X" aria-label="Stop" type="button">■</button>
        <button class="control-button" data-command="D" aria-label="Right" type="button">→</button>
        <span></span>
        <button class="control-button" data-command="S" aria-label="Backward" type="button">↓</button>
        <span></span>
      </section>

      <section class="speed-panel" aria-label="Speed">
        <div class="panel-label">
          <span>Speed</span>
          <output id="speedValue">100</output>
        </div>
        <input id="speedSlider" type="range" min="0" max="255" value="100" step="1">
      </section>

      <section class="joystick-panel" aria-label="Joystick">
        <div class="joystick" id="joystick">
          <div class="joystick-cross horizontal"></div>
          <div class="joystick-cross vertical"></div>
          <div class="joystick-knob" id="joystickKnob"></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
